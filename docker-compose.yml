services:
  backend:
    build: ./backend
    container_name: carshare-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - ORS_API_KEY=${ORS_API_KEY}

  frontend:
    build: ./frontend
    container_name: carshare-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
