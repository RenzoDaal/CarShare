services:
  backend:
    build: ./backend
    container_name: carshare-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - /home/RenzoDaal/carshare-data:/app/data
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: carshare-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  caddy:
    image: caddy:2
    container_name: carshare-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
